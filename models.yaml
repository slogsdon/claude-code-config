# Single source of truth for Shane's local model roster.
#
# ALL CALLS ROUTE THROUGH LITELLM — never direct to Ollama.
# Clients send the role alias (e.g. "writing", "vision") to the LiteLLM proxy,
# which then dispatches to the Ollama runtime. Ollama itself is internal-only.
#
# This YAML is the human-readable source of truth. Two consumer configs are
# kept in sync manually:
#   - ~/Code/claude-code-config/models.json  (Pi-compatible providers config)
#   - ~/Code/otel-local-ai/litellm/config.yaml  (the actual LiteLLM model_list)

proxy:
  name: litellm
  base_url: http://localhost:4000/v1
  api_key_env: LITELLM_API_KEY      # clients read this
  master_key_env: LITELLM_MASTER_KEY  # also accepted, server-side master key
  master_key_location: ~/Code/otel-local-ai/.env
  notes: |
    All scripts, skills, agents, Windmill flows, Pi, and Hermes must point at
    this proxy. The proxy applies OTel tracing, Langfuse callbacks, and routes
    to the appropriate Ollama tag.

runtime:
  name: ollama
  base_url: http://localhost:11434       # internal only — do NOT call directly
  proxy_to_runtime_base: http://host.docker.internal:11434  # how LiteLLM (in Docker) reaches Ollama (on host)

reasoning_concepts:
  description: |
    Two distinct concepts. Don't conflate.

      1. `reasoning` (boolean per model): does this model emit a <think>
         channel before its answer? Set in models.json so Pi knows whether
         to enable thinking mode in the request. Models with reasoning=true
         will use tokens on internal reasoning before producing visible
         output — set max_tokens generously when calling them.

      2. The `reasoning` ROLE ALIAS: points to phi4-reasoning:plus,
         specifically tuned for multi-step problems. Distinct from any other
         reasoning-capable model in the roster.

    Models WITH thinking channel:    general, reasoning, capable,
                                     capable-large, flash, vision (and -iso)
    Models WITHOUT thinking channel: code-autocomplete, fast-general,
                                     code-review, writing

context_modes:
  description: |
    Each model has two context-window settings. Concurrent is the LiteLLM
    default — small enough that two or three models can co-load on a 32 GB
    host without OOM. Isolated is the model's effective max for solo use.
    The big three (capable-large, flash, vision) expose an explicit `-iso`
    alias for isolated mode; smaller models use a single alias with the
    concurrent default and rely on per-request num_ctx overrides for
    isolated work.
  heuristic: |
    Pair (two co-loaded models): cap each at ~50–60% of ollama_max.
    Triple (three co-loaded models): cap each at ~40% of ollama_max.
    Big models (>=15 GB weights) always run isolated.

# Stable aliases callers should use. Send the alias as `model` to LiteLLM.
aliases:
  code-autocomplete:  qwen2.5-coder:3b-base
  fast-general:       gemma4:e4b-mlx
  code-review:        granite4.1:8b
  general:            qwen3.5:9b-mlx
  writing:            mistral-nemo:12b
  reasoning:          phi4-reasoning:plus
  capable:            qwen3:14b
  capable-large:      gpt-oss:20b
  flash:              glm-4.7-flash:q4_K_M
  vision:             qwen3-vl:30b
  # Isolated-mode variants (full context, run-alone only):
  capable-large-iso:  gpt-oss:20b
  flash-iso:          glm-4.7-flash:q4_K_M
  vision-iso:         qwen3-vl:30b

models:
  - alias: code-autocomplete
    ollama_tag: qwen2.5-coder:3b-base
    role_label: Code autocomplete
    use_case: Fast inline completion, Cursor/Copilot slot
    weight_size_gb: 1.9
    reasoning: false
    context:
      ollama_max: 32768
      concurrent_default: 16384
      isolated_max: 32768
    input: [text]
    notes: Base model — no chat template; use completion endpoint for fill-in-the-middle.

  - alias: fast-general
    ollama_tag: gemma4:e4b-mlx
    role_label: Fast general / vault
    use_case: Skill delegation, quick Q&A, Obsidian ops
    weight_size_gb: 9.6
    reasoning: false
    context:
      ollama_max: 131072
      concurrent_default: 32768
      isolated_max: 65536
    input: [text]
    notes: MLX-optimized — Apple Silicon only. Default for the ollama-agent MCP.

  - alias: code-review
    ollama_tag: granite4.1:8b
    role_label: Code review / enterprise
    use_case: Structured output, API doc work, IBM-style tasks
    weight_size_gb: 5.3
    reasoning: false
    context:
      ollama_max: 131072
      concurrent_default: 32768
      isolated_max: 65536
    input: [text]

  - alias: general
    ollama_tag: qwen3.5:9b-mlx
    role_label: General purpose
    use_case: Default chat, fast reasoning, most automation
    weight_size_gb: 8.9
    reasoning: true
    context:
      ollama_max: 262144
      concurrent_default: 32768
      isolated_max: 131072
    input: [text]
    notes: MLX-optimized — Apple Silicon only. Roster default. Emits <think> channel; budget tokens accordingly.

  - alias: writing
    ollama_tag: mistral-nemo:12b
    role_label: Writing / instruction
    use_case: Long-form drafts, blog, ghostwriting
    weight_size_gb: 7.1
    reasoning: false
    context:
      ollama_max: 1024000   # 1M ceiling per model card — practically unattainable on 32 GB
      concurrent_default: 32768
      isolated_max: 131072
    input: [text]

  - alias: reasoning
    ollama_tag: phi4-reasoning:plus
    role_label: Reasoning
    use_case: Multi-step problems, planning, math
    weight_size_gb: 11
    reasoning: true
    context:
      ollama_max: 32768
      concurrent_default: 16384
      isolated_max: 32768
    input: [text]
    notes: Always thinks — `thinking_level=off` is unsupported.

  - alias: capable
    ollama_tag: qwen3:14b
    role_label: Reasoning + coding
    use_case: Heavier tasks where quality > speed
    weight_size_gb: 9.3
    reasoning: true
    context:
      ollama_max: 40960
      concurrent_default: 16384
      isolated_max: 40960
    input: [text]
    notes: Emits <think> channel.

  - alias: capable-large
    ollama_tag: gpt-oss:20b
    role_label: Capable general
    use_case: When 14B isn't enough but VL not needed
    weight_size_gb: 13
    reasoning: true
    iso_alias: capable-large-iso
    context:
      ollama_max: 131072
      concurrent_default: 8192    # alias `capable-large`
      isolated_max: 65536         # alias `capable-large-iso`
    input: [text]
    notes: gpt-oss style chain-of-thought. Emits reasoning channel.

  - alias: flash
    ollama_tag: glm-4.7-flash:q4_K_M
    role_label: Multilingual / flash
    use_case: Chinese content, fast large-context tasks
    weight_size_gb: 19
    reasoning: true
    iso_alias: flash-iso
    context:
      ollama_max: 202752
      concurrent_default: 8192
      isolated_max: 131072
    input: [text]
    notes: 19 GB on disk. Practically isolated-only on a 32 GB host. Emits <think> channel.

  - alias: vision
    ollama_tag: qwen3-vl:30b
    role_label: Vision
    use_case: Any task with images, screenshots, video frames
    weight_size_gb: 19
    reasoning: true
    iso_alias: vision-iso
    context:
      ollama_max: 262144
      concurrent_default: 8192
      isolated_max: 65536
    input: [text, image]
    notes: The only vision-capable model in the roster. 19 GB weights — isolated-only in practice. Emits <think> channel.

# MLX vs GGUF context handling
mlx_notes: |
  The MLX-optimized models (gemma4:e4b-mlx, qwen3.5:9b-mlx) report context
  lengths through Ollama's /api/show modelinfo the same way GGUF models do
  (gemma4 -> 131072, qwen3.5 -> 262144). Ollama treats num_ctx the same
  regardless of backend, so the LiteLLM num_ctx override behaves identically.
  KV cache memory pressure is still real on MLX — large contexts on these
  models will consume host unified memory just like GGUF.
