# Single source of truth for Shane's local model roster.
#
# ALL CALLS ROUTE THROUGH LITELLM — never direct to Ollama.
# Clients send the role alias (e.g. "writing", "vision") to the LiteLLM proxy,
# which then dispatches to the Ollama runtime. Ollama itself is internal-only.
#
# This YAML is the human-readable source of truth. Two consumer configs are
# kept in sync manually:
#   - ~/Code/claude-code-config/models.json       (Pi-compatible providers config)
#   - ~/Code/otel-local-ai/litellm/config.yaml    (the actual LiteLLM model_list)

proxy:
  name: litellm
  base_url: http://localhost:4000/v1
  api_key_env: LITELLM_API_KEY        # clients read this
  master_key_env: LITELLM_MASTER_KEY  # also accepted, server-side master key
  master_key_location: ~/Code/otel-local-ai/.env
  notes: |
    All scripts, skills, agents, Windmill flows, Pi, and Hermes must point at
    this proxy. The proxy applies OTel tracing, Langfuse callbacks, and routes
    to the appropriate Ollama tag.

runtime:
  name: ollama
  base_url: http://localhost:11434       # internal only — do NOT call directly
  proxy_to_runtime_base: http://host.docker.internal:11434  # how LiteLLM (in Docker) reaches Ollama (on host)

context_strategy:
  description: |
    LiteLLM's num_ctx defaults to each model's isolated-mode ceiling — chosen
    so a single interactive CLI session (Pi, Hermes) can carry a long
    conversation without hitting auto-compaction. Pair/triple workloads
    should pass a smaller num_ctx in the request body, OR accept that
    Ollama will swap models when memory is tight.

    Values calibrated against weight + estimated KV cache to stay under
    ~28 GB combined on the 32 GB host. The `-iso` variants were removed
    on 2026-05-23 because they had become identical to the base routes.

reasoning_concepts:
  description: |
    Two distinct concepts. Don't conflate.

      1. `reasoning` (boolean per model): does this model emit a <think>
         channel before its answer? Set in models.json so Pi knows whether
         to enable thinking mode in the request. Models with reasoning=true
         will use tokens on internal reasoning before producing visible
         output — set max_tokens generously when calling them.

      2. The `reasoning` ROLE ALIAS: points to phi4-reasoning:plus,
         specifically tuned for multi-step problems. Distinct from any other
         reasoning-capable model in the roster.

    Models WITH thinking channel:    general, reasoning, capable,
                                     capable-large, vision, tiny-reason
    Models WITHOUT thinking channel: code-autocomplete, fast-general,
                                     code-review, writing, instruct,
                                     efficient

# Stable aliases callers should use. Send the alias as `model` to LiteLLM.
#
# Roster shuffle 2026-05-23 (post benchmarks):
#   - qwen3.6:35b-mlx serves both `general` and `vision` (was qwen3.5:9b-mlx
#     and qwen3-vl:30b respectively — both removed).
#   - `efficient` (lfm2:24b) is now the primary 20B-class default; was
#     `capable-large` (gpt-oss:20b). lfm2 is 6.8× faster on the same prompts
#     with comparable output quality. `capable-large` stays as a secondary
#     when you specifically need gpt-oss's reasoning-channel style.
#   - `flash` removed (glm-4.7-flash retired — slower than `efficient` and
#     `general` despite a larger footprint).
#   - New aliases: `instruct`, `efficient`, `tiny-reason`.
aliases:
  code-autocomplete:  qwen2.5-coder:3b-base
  fast-general:       gemma4:e4b-mlx
  code-review:        granite4.1:8b
  general:            qwen3.6:35b-mlx
  writing:            mistral-nemo:12b
  reasoning:          phi4-reasoning:plus
  capable:            qwen3:14b
  efficient:          lfm2:24b
  capable-large:      gpt-oss:20b
  vision:             qwen3.6:35b-mlx
  instruct:           ministral-3:14b
  tiny-reason:        lfm2.5-thinking:1.2b

models:
  - alias: code-autocomplete
    ollama_tag: qwen2.5-coder:3b-base
    role_label: Code autocomplete
    use_case: Fast inline completion, Cursor/Copilot slot
    weight_size_gb: 1.9
    reasoning: false
    context_window: 32768
    ollama_max: 32768
    input: [text]
    notes: Base model — no chat template; use completion endpoint for fill-in-the-middle.

  - alias: fast-general
    ollama_tag: gemma4:e4b-mlx
    role_label: Fast general / vault
    use_case: Skill delegation, quick Q&A, Obsidian ops
    weight_size_gb: 9.6
    reasoning: false
    context_window: 65536
    ollama_max: 131072
    input: [text]
    notes: MLX-optimized — Apple Silicon only. Default for the ollama-agent MCP.

  - alias: code-review
    ollama_tag: granite4.1:8b
    role_label: Code review / enterprise
    use_case: Structured output, API doc work, IBM-style tasks
    weight_size_gb: 5.3
    reasoning: false
    context_window: 65536
    ollama_max: 131072
    input: [text]

  - alias: general
    ollama_tag: qwen3.6:35b-mlx
    role_label: General purpose
    use_case: Default chat, vision-capable, most automation
    weight_size_gb: 21
    reasoning: true
    context_window: 65536
    ollama_max: 262144
    input: [text, image]
    notes: |
      MLX-optimized MoE — Apple Silicon only. Replaced qwen3.5:9b-mlx 2026-05-23
      after the second benchmark; doubles as the `vision` alias. Emits <think>
      channel — clients should set think:false or low effort for trivial
      prompts to avoid runaway reasoning. Conservative 64K default context to
      keep KV cache + 21 GB weights under the 32 GB host budget.

  - alias: writing
    ollama_tag: mistral-nemo:12b
    role_label: Writing / instruction
    use_case: Long-form drafts, blog, ghostwriting
    weight_size_gb: 7.1
    reasoning: false
    context_window: 131072
    ollama_max: 1024000   # 1M ceiling per model card — capped at 128K for memory
    input: [text]

  - alias: reasoning
    ollama_tag: phi4-reasoning:plus
    role_label: Reasoning
    use_case: Multi-step problems, planning, math
    weight_size_gb: 11
    reasoning: true
    context_window: 32768
    ollama_max: 32768
    input: [text]
    notes: Always thinks — `thinking_level=off` is unsupported.

  - alias: capable
    ollama_tag: qwen3:14b
    role_label: Reasoning + coding
    use_case: Heavier tasks where quality > speed
    weight_size_gb: 9.3
    reasoning: true
    context_window: 40960
    ollama_max: 40960
    input: [text]
    notes: Emits <think> channel.

  - alias: capable-large
    ollama_tag: gpt-oss:20b
    role_label: Capable general (secondary 20B-class)
    use_case: |
      Secondary 20B option — use when you specifically want gpt-oss's
      reasoning-channel chain-of-thought. For general fast-20B tasks, prefer
      `efficient` (lfm2:24b) which is 6.8× faster on the same prompts.
    weight_size_gb: 13
    reasoning: true
    context_window: 65536
    ollama_max: 131072
    input: [text]
    notes: gpt-oss style chain-of-thought. Emits reasoning channel.

  - alias: vision
    ollama_tag: qwen3.6:35b-mlx
    role_label: Vision (same backing model as `general`)
    use_case: Any task with images, screenshots, video frames
    weight_size_gb: 21
    reasoning: true
    context_window: 65536
    ollama_max: 262144
    input: [text, image]
    notes: |
      Same backing model as `general` (qwen3.6:35b-mlx) — alias kept distinct
      so vision-tagged traffic stays separable in Langfuse/observability. Was
      qwen3-vl:30b prior to 2026-05-23; qwen3-vl remains pulled and callable
      via raw ollama tag for comparison.

  - alias: instruct
    ollama_tag: ministral-3:14b
    role_label: Instruction following + vision + tools
    use_case: Structured output and tool-calling with optional image input;
      cheaper-than-`general` alternative when reasoning isn't needed
    weight_size_gb: 9.1
    reasoning: false
    context_window: 40960
    ollama_max: 262144
    input: [text, image]
    notes: |
      Mistral3 family. No thinking channel — clean instruction follower.
      Vision + tools native. 14B params, ~9 GB weights.

  - alias: efficient
    ollama_tag: lfm2:24b
    role_label: Efficient large general (primary 20B-class)
    use_case: |
      Primary "fast 20B" default. Use for any task where you'd reach for a
      large general model and want speed over chain-of-thought. Beat
      capable-large 6.8× on the 8-prompt speed benchmark (2026-05-23) at
      the same weight class.
    weight_size_gb: 14
    reasoning: false
    context_window: 32768
    ollama_max: 32768
    input: [text]
    notes: |
      Liquid Foundation Model 2 — MoE 24B (active params << total).
      No thinking channel, tools support. 32K hard context ceiling.
      Median 56 tps, 107 tps on trivial prompts.

  - alias: tiny-reason
    ollama_tag: lfm2.5-thinking:1.2b
    role_label: Ultra-fast reasoning
    use_case: Low-stakes reasoning where phi4's 5-15 min latency is
      unacceptable — e.g. trivial logic checks, fast quality filters,
      pre-flight validation steps
    weight_size_gb: 0.73
    reasoning: true
    context_window: 32768
    ollama_max: 128000
    input: [text]
    notes: |
      1.2B params, 731 MB weights. Thinking-capable. So small it can
      genuinely run alongside any other model without eviction.
      Quality ceiling is modest — don't use for production answers,
      use for fast yes/no logic decisions.

# MLX vs GGUF context handling
mlx_notes: |
  The MLX-optimized models (gemma4:e4b-mlx, qwen3.6:35b-mlx) report context
  lengths through Ollama's /api/show modelinfo the same way GGUF models do.
  Ollama treats num_ctx the same regardless of backend, so the LiteLLM
  num_ctx override behaves identically. KV cache memory pressure is real
  on MLX too — large contexts on these models will consume host unified
  memory just like GGUF.
