# Single source of truth for Shane's local model roster.
#
# ALL CALLS ROUTE THROUGH LITELLM — never direct to Ollama.
# Clients send the role alias (e.g. "write", "quality") to the LiteLLM proxy,
# which then dispatches to the Ollama runtime. Ollama itself is internal-only.
#
# This YAML is the human-readable source of truth. Two consumer configs are
# kept in sync manually:
#   - ~/Code/claude-code-config/models.json       (Pi-compatible providers config)
#   - ~/Code/otel-local-ai/litellm/config.yaml    (the actual LiteLLM model_list)

proxy:
  name: litellm
  base_url: http://localhost:4000/v1
  api_key_env: LITELLM_API_KEY        # clients read this
  master_key_env: LITELLM_MASTER_KEY  # also accepted, server-side master key
  master_key_location: ~/Code/otel-local-ai/.env
  notes: |
    All scripts, skills, agents, Windmill flows, Pi, and Hermes must point at
    this proxy. The proxy applies OTel tracing, Langfuse callbacks, and routes
    to the appropriate Ollama tag.

runtime:
  name: ollama
  base_url: http://localhost:11434       # internal only — do NOT call directly
  proxy_to_runtime_base: http://host.docker.internal:11434  # how LiteLLM (in Docker) reaches Ollama (on host)

context_strategy:
  description: |
    LiteLLM's num_ctx defaults to each model's isolated-mode ceiling — chosen
    so a single interactive CLI session (Pi, Hermes) can carry a long
    conversation without hitting auto-compaction. Pair/triple workloads
    should pass a smaller num_ctx in the request body, OR accept that
    Ollama will swap models when memory is tight.

    Values calibrated against weight + estimated KV cache to stay under
    ~28 GB combined on the 32 GB host.

reasoning_concepts:
  description: |
    The `reasoning` boolean on each model entry tracks whether that model
    emits a <think> channel before its visible answer. Set in models.json so
    Pi knows whether to enable thinking mode in the request. Models with
    reasoning=true will burn tokens on internal reasoning before producing
    visible output — set max_tokens generously when calling them.

    Models WITH thinking channel:    classify, analyze, write, quality
    Models WITHOUT thinking channel: chat, review, code, pipeline

# Stable aliases callers should use. Send the alias as `model` to LiteLLM.
#
# 2026-05-26 rename: aliases are now use-case-oriented. Old job-coded names
# (capable, efficient, capable-large, general, writing, reasoning, vision,
# code-review, code-mid, code-autocomplete, fast-general, tiny-reason,
# reasoning-deep, instruct) are gone. The current 8 are organized by what
# the caller is trying to do, not by the model's size or family.
aliases:
  classify: lfm2.5-thinking:1.2b
  chat:     gemma4:e4b-mlx
  review:   granite4.1:8b
  code:     qwen2.5-coder:14b
  analyze:  deepseek-r1:14b
  pipeline: lfm2:24b
  write:    gpt-oss:20b
  quality:  qwen3.6:35b-mlx

models:
  - alias: classify
    ollama_tag: lfm2.5-thinking:1.2b
    role_label: Cheap structured-output / triage
    use_case: |
      Triage, classification, fast yes/no logic decisions, pre-flight
      validation. Cheapest reasoning-capable model in the roster — use when
      `analyze`'s latency is overkill.
    weight_size_gb: 0.73
    reasoning: true
    context_window: 128000  # bumped 32K -> 128K 2026-05-24 — 1.2B holds 117 tps at the cap, KV is free at this scale
    ollama_max: 128000
    input: [text]
    notes: |
      1.2B params, 731 MB weights. Thinking-capable. So small it can
      genuinely run alongside any other model without eviction.
      Quality ceiling is modest — use for fast yes/no decisions, not
      production answers.

  - alias: chat
    ollama_tag: gemma4:e4b-mlx
    role_label: Fast conversational
    use_case: Short-context Q&A, quick chat, Obsidian ops, skill delegation
    weight_size_gb: 9.6
    reasoning: false
    context_window: 131072  # bumped 64K -> 128K 2026-05-24 — max-ctx run showed no throughput penalty
    ollama_max: 131072
    input: [text]
    notes: |
      MLX-optimized — Apple Silicon only. Default for the ollama-agent MCP.
      Gemma4's chat template has thinking baked in; the proxy forces
      think:false so this alias is actually fast.

  - alias: review
    ollama_tag: granite4.1:8b
    role_label: Code review / rubric grading
    use_case: Code review, rubric grading, structured eval, API doc work
    weight_size_gb: 5.3
    reasoning: false
    context_window: 65536  # HELD at 64K 2026-05-24 — 128K dropped tps 22% in the max-ctx run
    ollama_max: 131072
    input: [text]

  - alias: code
    ollama_tag: qwen2.5-coder:14b
    role_label: Primary code generation
    use_case: Code generation, refactoring, code explanation
    weight_size_gb: 8.4
    reasoning: false
    context_window: 65536  # 14B dense — held at 64K, code prompts are usually short
    ollama_max: 32768
    input: [text]
    notes: |
      Qwen2.5-coder 14B — the no-thinking-tax code slot. Faster total wall
      than the reasoning-channel options on code tasks because it doesn't
      spend tokens on internal monologue.

  - alias: analyze
    ollama_tag: deepseek-r1:14b
    role_label: Analysis + debugging + judge
    use_case: |
      Analysis, debugging, judge-pipeline reasoning. The default judge for
      the publish-gate / iteration loop in ~/Code/otel-local-ai. 4.4×
      faster total wall than phi4-reasoning on the same prompts.
    weight_size_gb: 8.4
    reasoning: true
    context_window: 40960  # 14B dense — capped at 40K, big KV caches kill throughput
    ollama_max: 131072
    input: [text]
    notes: |
      deepseek-r1 emits <think>...</think> inline in the visible content
      channel rather than via a separate thinking field — the proxy does
      NOT set think:true here, since it would not route them to
      reasoning_content anyway.

  - alias: pipeline
    ollama_tag: lfm2:24b
    role_label: Automation flows + summarization
    use_case: |
      Automation workflows, fast structured tasks, summarization, publish
      gate verdicts. Primary "fast 20B" route — beat gpt-oss:20b 6.8× on
      the 8-prompt speed benchmark (2026-05-23) at the same weight class.
    weight_size_gb: 14
    reasoning: false
    context_window: 32768
    ollama_max: 32768
    input: [text]
    notes: |
      Liquid Foundation Model 2 — MoE 24B (active params << total).
      No thinking channel, tools support. 32K hard context ceiling.
      Median 56 tps, 107 tps on trivial prompts.

  - alias: write
    ollama_tag: gpt-oss:20b
    role_label: Long-form writing
    use_case: |
      Long-form writing pipeline — blog drafts, ghostwriting, multi-section
      composition. Slower than `pipeline` but uses gpt-oss's reasoning
      channel for more deliberate prose construction.
    weight_size_gb: 13
    reasoning: true
    context_window: 131072  # bumped 64K -> 128K 2026-05-24 — held 26 tps at 128K, no penalty
    ollama_max: 131072
    input: [text]
    notes: gpt-oss style chain-of-thought. Emits reasoning channel.

  - alias: quality
    ollama_tag: qwen3.6:35b-mlx
    role_label: Best local quality / long context
    use_case: |
      Best local quality, long context, complex multi-step tasks. Use when
      you'd otherwise reach for a frontier API and want to stay local.
    weight_size_gb: 21
    reasoning: true
    context_window: 131072  # bumped 64K -> 128K 2026-05-24 — MLX MoE absorbs KV growth without losing tps
    ollama_max: 262144
    input: [text, image]
    notes: |
      MLX-optimized MoE — Apple Silicon only. Vision-capable. Emits <think>
      channel — clients should set think:false or low effort for trivial
      prompts to avoid runaway reasoning. 128K default context after the
      max-ctx benchmark proved the MoE held 35 tps from 64K all the way to
      256K with only a small cold-load tax.

# MLX vs GGUF context handling
mlx_notes: |
  The MLX-optimized models (gemma4:e4b-mlx, qwen3.6:35b-mlx) report context
  lengths through Ollama's /api/show modelinfo the same way GGUF models do.
  Ollama treats num_ctx the same regardless of backend, so the LiteLLM
  num_ctx override behaves identically. KV cache memory pressure is real
  on MLX too — large contexts on these models will consume host unified
  memory just like GGUF.
