# Single source of truth for Shane's local model roster.
#
# ALL CALLS ROUTE THROUGH LITELLM — never direct to the runtime.
# Clients send the alias (e.g. "writing", "max") to the LiteLLM proxy,
# which dispatches to llama-swap (on :8081), which on-demand loads/unloads
# the backing GGUF on llama-server (llama.cpp). The runtime is internal-only.
#
# 2026-06-18 RUNTIME MIGRATION: Ollama -> llama-swap + llama-server.
# Ollama 0.30 diverged its inference engine and its newest GGUF blobs no longer
# load on upstream llama.cpp (qwen35moe rope metadata, lfm2 tensor naming), so the
# roster moved to upstream-compatible GGUFs served by llama-server under llama-swap.
# See INFRASTRUCTURE.md for the full story, blob provenance, and the required
# `iogpu.wired_limit_mb` Metal tweak.
#
# This YAML is THE source of truth for the roster. The tier+role scheme
# originates from the `hermes-dispatch` open-source project (upstream, NOT checked
# out locally — do not expect a config file on disk for it).
#
# Consumer configs are GENERATED from this file by bin/gen-roster.py —
# do not hand-edit them; edit here and re-run the generator:
#   - ~/.config/llama-swap/config.yaml             (llama-swap model defs + aliases)
#   - ~/Code/otel-local-ai/litellm/config.yaml     (the live LiteLLM model_list)
#   - ~/Code/claude-code-config/models.json         (Pi-compatible providers config)
#   - ~/Code/hermes-dispatch/hermes-home/config.yaml (Hermes custom_providers models block)
# A fifth, illustrative copy is regenerated too:
#   - ~/Code/mac-mini-llm-roster/litellm-example/config.yaml
#
# ── Generation field reference (per model entry) ──────────────────────────
#   context_window        : the ADVERTISED window (drives Pi contextWindow and is
#                           the default LiteLLM num_ctx). What callers budget for.
#   litellm_num_ctx       : (optional) the REAL Ollama num_ctx when it must differ
#                           from context_window. Only `code` needs this today (its
#                           advertised 64K would otherwise crash to empty output).
#   litellm_think         : (optional) the LiteLLM `think` param (true/false). Not
#                           derivable from `reasoning` — set explicitly. Omitted
#                           from output when absent.
#   pi_name               : Pi display name (defaults to role_label).
#   pi_max_tokens         : Pi maxTokens (default 16384).
#   pi_thinking_map       : (optional bool) emit Pi thinkingLevelMap for this model.
#   hermes_context_length : (optional) presence == included in Hermes; value is what
#                           Hermes BUDGETS (floor 64000, may exceed real num_ctx).

proxy:
  name: litellm
  base_url: http://localhost:4000/v1
  api_key_env: LITELLM_API_KEY        # clients read this
  master_key_env: LITELLM_MASTER_KEY  # also accepted, server-side master key
  master_key_location: ~/Code/otel-local-ai/.env
  notes: |
    All scripts, skills, agents, Windmill flows, Pi, and Hermes must point at
    this proxy. The proxy applies OTel tracing, Langfuse callbacks, and routes
    to the appropriate llama-swap model id.

runtime:
  name: llama-swap
  backend: llama-server                    # llama.cpp; GGUF inference, -ngl 99 (Metal)
  base_url: http://localhost:8081          # internal only — llama-swap OpenAI endpoint
  proxy_to_runtime_base: http://host.docker.internal:8081/v1  # how LiteLLM (in Docker) reaches llama-swap (on host)
  swap_config: ~/.config/llama-swap/config.yaml   # GENERATED by bin/gen-roster.py
  llama_server_bin: ~/bin/llama-server     # stable symlink -> brew llama.cpp keg
  gguf_dir: ~/models/gguf                  # where downloaded/copied GGUFs live
  ttl: 300                                 # llama-swap idle-unload seconds
  notes: |
    llama-server needs the Metal GPU working-set raised above its ~21.3 GB
    default on this 32 GB M4, or models >~17 GB OOM on compute. Set persistently
    via the LaunchDaemon in INFRASTRUCTURE.md:
      sudo sysctl iogpu.wired_limit_mb=28672

context_strategy:
  description: |
    LiteLLM's num_ctx defaults to each model's isolated-mode ceiling — chosen
    so a single interactive CLI session (Pi, Hermes) can carry a long
    conversation without hitting auto-compaction. Pair/triple workloads
    should pass a smaller num_ctx in the request body, OR accept that
    Ollama will swap models when memory is tight.

    Values calibrated against weight + estimated KV cache to stay under
    ~28 GB combined on the 32 GB host.

reasoning_concepts:
  description: |
    The `reasoning` boolean on each model entry tracks whether that model
    emits a <think> channel before its visible answer. Set in models.json so
    Pi knows whether to enable thinking mode in the request. Models with
    reasoning=true will burn tokens on internal reasoning before producing
    visible output — set max_tokens generously when calling them.

    Models WITH thinking channel:    classify, max
    Models WITHOUT thinking channel: fast, balanced, structured, code, writing, reasoning

# Stable aliases callers should use. Send the alias as `model` to LiteLLM.
#
# 2026-06-05 migration: aliases moved to a tier+role scheme. Two axes —
#   TIERS (capability/cost spine, always available): fast / balanced / max
#   TASK ROLES (specialized models that beat a tier for a job):
#     structured / code / writing / reasoning
# `classify` is retained outside the scheme for legacy cheap-triage callers.
#
# This replaced the use-case names (classify/chat/review/code/analyze/pipeline/
# write/quality, 2026-05-26) and the older job-coded names before that.
# Rename map from the use-case scheme:
#   chat→fast  review→balanced  quality→max  pipeline→structured
#   analyze→reasoning  write→writing  code→code (unchanged)  classify (kept)
# NOTE: the right-hand values are llama-swap model ids (was Ollama tags pre-2026-06-18).
aliases:
  # tiers (required capability spine)
  fast:       gemma-4-e4b
  balanced:   granite4.1:8b
  max:        qwen3.6:35b
  # task roles (specialized)
  structured: lfm2:24b
  code:       qwen3-coder:30b
  writing:    gemma-4-26b
  reasoning:  qwen3.6:35b  # 2026-06-07: was deepseek-r1:14b — see eval_reasoning gate
  # retained
  classify:   lfm2.5-thinking:1.2b

models:
  # ─── tiers ───────────────────────────────────────────────────────────────
  - alias: fast
    tier: fast
    ollama_tag: gemma-4-e4b   # llama-swap model id (was gemma4:e4b-mlx on Ollama)
    gguf_path: ~/models/gguf/gemma-4-E4B-it-Q4_K_M.gguf   # unsloth/gemma-4-E4B-it-GGUF
    role_label: Fast tier — quick triage / routing / short chat
    use_case: Short-context Q&A, quick chat, Obsidian ops, skill delegation, routing
    weight_size_gb: 9.6
    reasoning: false
    context_window: 131072  # bumped 64K -> 128K 2026-05-24 — max-ctx run showed no throughput penalty
    ollama_max: 131072
    input: [text]
    litellm_think: false
    pi_name: Fast tier — triage / routing / short chat (gemma 4 E4B)
    hermes_context_length: 131072
    notes: |
      2026-06-18: gemma4:e4b-mlx (nvfp4) -> unsloth/gemma-4-E4B-it GGUF Q4_K_M
      (4.6 GB) on llama-server. Default for the ollama-agent MCP. Gemma's chat
      template has thinking; LiteLLM forces enable_thinking:false (via
      chat_template_kwargs) so this alias stays fast.

  - alias: balanced
    tier: balanced
    ollama_tag: granite4.1:8b
    # Reused Ollama GGUF blob, read directly by llama-server (Ollama daemon not needed).
    # To fully decouple from the Ollama store, copy to ~/models/gguf/granite-4.1-8b.gguf and repoint.
    gguf_path: ~/.ollama/models/blobs/sha256-ed902ac9eb6adce5a90c6a08c8ea201b50e23fdc5976d1cd0362006afac5309e
    role_label: Balanced tier — solid default, review / rubric grading
    use_case: Default for most work; code review, rubric grading, structured eval, API doc work
    weight_size_gb: 5.3
    reasoning: false
    context_window: 65536  # HELD at 64K 2026-05-24 — 128K dropped tps 22% in the max-ctx run
    ollama_max: 131072
    input: [text]
    pi_name: Balanced tier — solid default, review / rubric grading (granite4.1 8B)
    hermes_context_length: 65536
    notes: |
      Cheap but accuracy on hard rubrics is modest — that's why
      high-consequence agents (review, legal, strategy) reach for `max`.

  - alias: max
    tier: max
    ollama_tag: qwen3.6:35b
    gguf_path: ~/models/gguf/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf   # unsloth/Qwen3.6-35B-A3B-GGUF
    role_label: Max tier — best local quality / long context
    use_case: |
      Best local quality, long context, complex multi-step / high-consequence
      tasks. Use when you'd otherwise reach for a frontier API and want to stay
      local. RUNS ALONE on the 32 GB host (21 GB resident).
    weight_size_gb: 21
    reasoning: true
    context_window: 131072  # bumped 64K -> 128K 2026-05-24 — MoE absorbs KV growth without losing tps
    ollama_max: 262144
    input: [text, image]
    pi_name: Max tier — best local quality / long context (qwen3.6 35B MoE — vision-capable)
    pi_thinking_map: true
    hermes_context_length: 131072
    notes: |
      2026-06-18: qwen3.6:35b (Ollama nvfp4 MLX) -> unsloth/Qwen3.6-35B-A3B
      GGUF UD-Q4_K_M (20.6 GB) on llama-server. The Ollama blob would NOT load
      on upstream llama.cpp (qwen35moe rope.dimension_sections is 3 ints; stock
      loader demands 4) — the unsloth conversion pads it. Emits <think> channel;
      `max` keeps thinking ON (pi_thinking_map). REQUIRES iogpu.wired_limit_mb
      raised (weights ~= the default 21.3 GB Metal budget). 128K context held
      35 tps 64K->256K in the max-ctx benchmark.

  # ─── task roles ──────────────────────────────────────────────────────────
  - alias: structured
    tier: fast  # inherits the fast tier when unspecified
    ollama_tag: lfm2:24b
    # Reused Ollama GGUF blob (read directly by llama-server). Needs --jinja to emit output.
    gguf_path: ~/.ollama/models/blobs/sha256-d55ab0bfb1b80102465eef8a17f05d201fb17dbe27a62f153f0db6c446aed077
    role_label: Structured role — fast structured / JSON output
    use_case: |
      Automation workflows, fast structured tasks, summarization, publish
      gate verdicts, the dispatch router. Primary "fast 20B" route — beat
      gpt-oss:20b 6.8× on the 8-prompt speed benchmark (2026-05-23).
    weight_size_gb: 14
    reasoning: false
    context_window: 32768
    ollama_max: 32768
    input: [text]
    pi_name: Structured role — fast reliable structured/JSON output (lfm2 24B MoE)
    hermes_context_length: 64000   # Hermes floor; real num_ctx is 32768
    notes: |
      Liquid Foundation Model 2 — MoE 24B (active params << total).
      No thinking channel, tools support. 32K hard context ceiling.
      Median 56 tps, 107 tps on trivial prompts.

  - alias: code
    tier: balanced  # inherits the balanced tier when unspecified
    ollama_tag: qwen3-coder:30b
    # Reused Ollama GGUF blob, read directly by llama-server (Ollama daemon not needed).
    gguf_path: ~/.ollama/models/blobs/sha256-1194192cf2a187eb02722edcc3f77b11d21f537048ce04b67ccf8ba78863006a
    role_label: Code role — primary code generation
    use_case: Code generation, refactoring, code explanation
    weight_size_gb: 18
    reasoning: false
    context_window: 65536  # ADVERTISED 64K — code prompts are usually short
    litellm_num_ctx: 32768  # REAL num_ctx: 65536 yields EMPTY completions on the 32GB box (KV OOM)
    ollama_max: 262144
    input: [text]
    pi_name: Code role — primary code generation (qwen3-coder 30B MoE)
    hermes_context_length: 65536
    notes: |
      2026-06-04: dense qwen2.5-coder:14b -> qwen3-coder:30b (MoE, 3.3B
      active). No-thinking-tax code slot — faster total wall than the
      reasoning-channel options on code tasks because it doesn't spend
      tokens on internal monologue. 18 GB on disk; cannot co-load with
      `max` or `writing` on the 32 GB host.
      LiteLLM num_ctx pinned to 32768: 65536 exceeds available KV memory and
      Ollama silently yields 0 tokens. Advertised window stays 64K (Pi) /
      Hermes budgets 65536 — separate from the real Ollama num_ctx.
      2026-06-18: evaluated north-mini-code-1.0:q4_K_M (30.5B Cohere MoE,
      cohere2moe, Q4_K_M, 18 GB — same slot class) and REJECTED. It's a
      reasoning model in a code skin: emits Cohere thinking tokens
      (255011/255014) and at think:false dumps the whole generation into the
      stripped thinking channel, yielding EMPTY completions on non-trivial
      prompts (same failure that disqualified deepseek-r1). 33.8 tps vs
      qwen3-coder's 38.6, and ~2x worse TTFT. At think:true output is correct
      and on par with qwen quality, but costs ~200s/prompt of thinking tax —
      antithetical to this no-thinking-tax slot. Not worth a slot on the 32 GB
      host; no fast-completion niche either (it's slower). Kept qwen3-coder:30b.

  - alias: writing
    tier: balanced  # inherits the balanced tier when unspecified
    ollama_tag: gemma-4-26b   # llama-swap model id (was gemma4:26b-mlx on Ollama)
    gguf_path: ~/models/gguf/gemma-4-26B-A4B-it-UD-Q4_K_M.gguf   # unsloth/gemma-4-26B-A4B-it-GGUF
    role_label: Writing role — long-form prose
    use_case: |
      Long-form writing pipeline — blog drafts, ghostwriting, multi-section
      composition.
    weight_size_gb: 16
    reasoning: false
    context_window: 65536  # dropped 128K -> 64K 2026-06-04 with the gemma4:26b swap
    ollama_max: 262144
    input: [text]
    litellm_think: false
    pi_name: Writing role — long-form prose (gemma 4 26B A4B MoE)
    hermes_context_length: 131072  # NOTE: stale vs 64K real — left as-is under lossless adoption
    notes: |
      2026-06-04: gpt-oss:20b -> gemma4:26b-mlx (MLX MoE, 6.3B active).
      2026-06-18: gemma4:26b-mlx (nvfp4) -> unsloth/gemma-4-26B-A4B-it GGUF
      UD-Q4_K_M (16.9 GB) on llama-server — same model, GGUF instead of MLX.
      Write eval ~28.5 tps, 0 empty drafts. think:false is MANDATORY (gemma's
      template bakes in a thinking channel); LiteLLM forces enable_thinking:false.
      17 GB; cannot co-load with `max` or `code` on the 32 GB host.

  - alias: reasoning
    tier: max  # inherits the max tier when unspecified
    ollama_tag: qwen3.6:35b
    role_label: Reasoning role — analysis + debugging + judge
    use_case: |
      Analysis, debugging, judge-pipeline reasoning, the dispatch enhancer.
      The default judge for the publish-gate / iteration loop in
      ~/Code/otel-local-ai. RUNS ALONE on the 32 GB host (21 GB resident) —
      same model as `max`, so the two consolidate onto one resident load.
    weight_size_gb: 21
    reasoning: false  # served think:false — see notes
    context_window: 131072
    ollama_max: 262144
    input: [text, image]
    litellm_think: false
    pi_name: Reasoning role — analysis + debugging + judge (qwen3.6 35B MoE, served think:false)
    hermes_context_length: 64000   # Hermes floor; real num_ctx is 131072
    notes: |
      2026-06-07: deepseek-r1:14b -> qwen3.6:35b-mlx. The reasoning gate
      (`scripts/eval_reasoning.py` in otel-local-ai) disqualified deepseek-r1:
      40% EMPTY answers (its inline <think> ate the token budget even at
      think:false), slowest in the roster (~11 tps), lowest correctness.
      qwen3.6:35b scored 95% anchors / 0 empty at think:false (vs deepseek 43%).
      think:false is MANDATORY: with thinking ON, qwen3.6 burns the budget
      reasoning and returns an EMPTY answer — so the proxy forces think:false
      and this alias is marked reasoning:false. MoE, vision-capable. The
      alternative pick was qwen3-coder:30b (82% anchors, 3× faster, co-loads
      with `code`) — switch the tag if speed/co-load matters more than the
      ~13% correctness edge.

  # ─── retained (outside the tier/role scheme) ──────────────────────────────
  - alias: classify
    ollama_tag: lfm2.5-thinking:1.2b
    gguf_path: ~/models/gguf/LFM2.5-1.2B-Thinking-Q8_0.gguf   # LiquidAI/LFM2.5-1.2B-Thinking-GGUF
    role_label: Retained — cheap structured-output / triage
    use_case: |
      Triage, classification, fast yes/no logic decisions, pre-flight
      validation. Cheapest reasoning-capable model in the roster — use when
      `reasoning`'s latency is overkill. Kept for legacy callers; not part of
      the tier/role scheme.
    weight_size_gb: 0.73
    reasoning: true
    context_window: 128000  # bumped 32K -> 128K 2026-05-24 — 1.2B holds 117 tps at the cap, KV is free at this scale
    ollama_max: 128000
    input: [text]
    litellm_think: true
    pi_name: Retained — cheap structured-output / triage (lfm2.5-thinking 1.2B)
    pi_max_tokens: 8192
    pi_thinking_map: true
    # no hermes_context_length: classify is not exposed to Hermes
    notes: |
      2026-06-18: Ollama lfm2.5-thinking blob would NOT load on upstream
      llama.cpp (missing tensor token_embd_norm.weight) -> switched to the
      official LiquidAI/LFM2.5-1.2B-Thinking GGUF Q8_0 (1.25 GB). Thinking-
      capable (litellm_think:true). So small it runs alongside anything without
      eviction. Quality ceiling is modest — fast yes/no, not production answers.
      2026-06-19: evaluated WeiboAI/VibeThinker-3B (prithivMLmods GGUF Q8_0,
      3.1 GB; fine-tune of Qwen2.5-Coder-3B, MIT — a math/code COMPETITION-
      reasoning specialist) for the gap between this slot and `balanced`, and
      REJECTED. It is a long chain-of-thought model: spends its whole budget in
      <think> before answering. At the roster's max_tokens=300 it returned 0/5
      complete answers (every prompt truncated mid-think — the SAME failure that
      disqualified deepseek-r1 and north-mini-code); unconstrained it burns
      800-1300 tok/answer and spent 1255 tokens to emit a single sentiment
      label. Speed ~28 tps (sits between classify ~72 and balanced ~17). Math/
      reasoning QUALITY is genuinely high unconstrained (bat-ball $0.05;
      stars-and-bars 15, even flagging the distinct-balls 1806 alternative),
      but (1) it is the antithesis of this cheap/fast-triage slot — slow CoT by
      design that over-thinks even a yes/no label; (2) it does not beat
      `reasoning`/`max` (qwen3.6:35b — 95% anchors, vision, 131K) on general
      reasoning, being only a narrow competition-math specialist; (3) no
      compensating niche on the 32 GB host. ALSO tested for light parallel
      SWARM-CODING (fan out many small scoped tasks — single fn / docstring /
      tests): the same thinking tax kills it. 79-90% of every response is
      <think>; test-gen and docstring were correct, but the simplest task (a
      slugify fn) cost 88s / 2394 tok AND came out buggy (.replace(' ','-')
      hits only the first space; .trim('-') is invalid JS), and a 2048-tok run
      produced no answer at all. Swarm capacity is COMPUTE-bound, not memory-
      bound: ~3.5 GB/instance (3.1 weights + ~72 MB KV@2K, 36L×2KV×128) means
      ~6-8 separate llama-server instances fit the 28 GB GPU wired budget, or
      one --parallel server holds 300+ 2K KV slots — but the single M4 10-core
      GPU (~28 tps/stream) caps useful concurrency at ~4-8 streams. Either way
      each "small" task costs 800-2400 tok / 30-88s — antithetical to fast
      swarm grunt-work; a no-think 3B coder would emit the same in <5s.
      Can thinking be disabled? No official toggle (Qwen2.5 base, no
      enable_thinking; card has none — it's RL-trained to always reason). The
      <think></think> assistant-prefill hack PARTIALLY works: cuts tokens 3-7x
      (bat-ball 848->284, slugify 2394->347) and math stays correct ($0.05),
      BUT the model just relocates reasoning into the visible answer (narrates
      steps inline, sometimes re-opens <think>), and code reliability DROPS —
      a no-think slugify returned prose + a wrong example and no function at
      all. Suppressing CoT discards the one thing it's good at. No roster slot.
      GGUF deleted; temp llama-swap entry reverted.

# LiteLLM-only judge/gate aliases for the blog quality pipeline (Sub-project B
# in otel-local-ai). Low context so they co-load beside the 21 GB `max`
# (qwen3.6:35b) on the 32 GB mini — a draft + brief + rubric needs < 16K tokens.
# Not exposed to Pi or Hermes; emitted only into the LiteLLM model_list.
judge_aliases:
  - alias: reasoning-judge   # judge_pipeline's VOICE judge — same model as max-judge
    ollama_tag: qwen3.6:35b
    litellm_num_ctx: 16384
    litellm_think: false
  - alias: balanced-judge
    ollama_tag: granite4.1:8b
    litellm_num_ctx: 16384
  - alias: max-judge
    ollama_tag: qwen3.6:35b
    litellm_num_ctx: 16384

# Pi (models.json) scaffolding — provider settings and workflow routing that are
# Pi-specific (not per-model). baseUrl comes from proxy.base_url above.
pi:
  comment: >-
    Pi-compatible custom provider config. GENERATED from
    ~/Code/claude-code-config/models.yaml by bin/gen-roster.py — do not hand-edit;
    edit models.yaml and regenerate. All Pi traffic routes through the LiteLLM
    proxy on :4000 — never direct to Ollama. Aliases use the tier+role scheme
    (fast/balanced/max tiers; structured/code/writing/reasoning roles; classify
    retained). Context windows are advertised isolated-mode values; concurrent
    multi-model workloads should override num_ctx per request.
  workflows:
    default:
      plan: reasoning
      code: code
      review: balanced
      write: writing
  provider:
    name: litellm
    api: openai-completions
    apiKey: "!grep -E '^LITELLM_MASTER_KEY=' /Users/shane/Code/otel-local-ai/.env | cut -d= -f2"
    authHeader: true
    compat:
      supportsDeveloperRole: false
      supportsReasoningEffort: false
  # Emitted for any model whose pi_thinking_map is true.
  thinking_level_map:
    minimal: null
    low: low
    medium: medium
    high: high
    xhigh: high

# Runtime / memory notes (post 2026-06-18 llama-swap migration)
runtime_notes: |
  All models are now GGUF served by llama-server (llama.cpp) under llama-swap.
  The whole roster left MLX/nvfp4 behind: Ollama 0.30's nvfp4 MLX builds and
  some of its GGUFs only run on Ollama's own forked engine, not upstream
  llama.cpp. Per-model llama-server context (-c) is set from litellm_num_ctx
  (or context_window) by bin/gen-roster.py; aliases sharing a model id (max +
  reasoning + judges -> qwen3.6:35b) launch ONE llama-server at the max of their
  contexts, and thinking is toggled per-request at the LiteLLM layer via
  chat_template_kwargs.enable_thinking (replacing Ollama's `think`).

  Metal KV/compute memory pressure is real: on the 32 GB M4 the default GPU
  working-set is only ~21.3 GB, so the ~20.6 GB `max` weights OOM on compute
  unless iogpu.wired_limit_mb is raised (28672). See INFRASTRUCTURE.md.
